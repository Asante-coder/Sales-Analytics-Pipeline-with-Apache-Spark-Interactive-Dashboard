name: CI - Spark Sales Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # Module 1: Environment Setup & Dependency Install
  setup:
    runs-on: ubuntu-latest
    outputs:
      repo_name: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

  # Module 2: Run Spark App & Health Check
  # This "needs" setup to finish first
  test_app:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Streamlit & Spark
        run: |
          nohup streamlit run app.py --server.port 8501 &
          sleep 30
      - name: Health check
        run: curl --fail http://localhost:8501 || exit 1

  # Module 3: Slack Notification
  # This runs regardless of whether the test passed or failed
  notify:
    needs: test_app
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Detailed Slack Alert
        env:
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ needs.test_app.result }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          
          MSG_TEXT="$ICON *CI $STATUS*
          *Repo:* ${{ github.repository }}
          *Commit:* ${GITHUB_SHA::8}
          *Author:* ${{ github.event.head_commit.author.name }}
          *Event:* ${{ github.event_name }}"
          
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$MSG_TEXT\"}" "$SLACK_URL"